# Canonical rule block from async-digital-ltd/swift-tooling templates/swiftlint-rules.yml
# (rollout: async-digital-ltd/swift-tooling#21). This file must exist per-package because
# the SwiftLint build-tool plugin does not search upward for config.

included:
  - Sources
  - Tests

excluded:
  - "**/*.generated.swift"
  - "**/.build"

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - first_where
  - flatmap_over_map_reduce
  - implicit_return
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 100

function_parameter_count:
  warning: 6
  error: 8

cyclomatic_complexity:
  ignores_case_statements: true

type_name:
  excluded:
    - ID

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - i
    - x
    - y
    - id
    - to

nesting:
  type_level:
    warning: 3
  function_level:
    warning: 3

reporter: xcode
